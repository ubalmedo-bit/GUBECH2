<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUBECH Agenda Pro - Control de Kits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 0px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .nav-item.active { color: #db2777; }
        .glass-header {
            background: linear-gradient(135deg, #831843 0%, #be185d 50%, #db2777 100%);
        }
        .modal-overlay {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
        .card-done {
            background-color: #f0fdf4 !important;
            border-left-color: #22c55e !important;
            opacity: 0.9;
        }
        @media print {
            nav, header, .no-print { display: none !important; }
            body { background: white; }
            #app-container { max-width: 100%; box-shadow: none; }
        }
    </style>
</head>
<body>
    <div id="app-container" class="w-full max-w-[480px] bg-white min-h-screen shadow-2xl relative flex flex-col">
        
        <div id="loading-screen" class="absolute inset-0 z-[100] bg-pink-50 flex flex-col items-center justify-center transition-opacity duration-500">
            <div class="animate-spin text-pink-600 mb-4">
                <i data-lucide="loader-2" class="w-12 h-12"></i>
            </div>
            <p class="text-pink-800 font-serif font-bold text-2xl tracking-tighter">GUBECH</p>
            <p class="text-pink-400 text-[10px] uppercase tracking-widest mt-2 font-bold">Iniciando Sistema...</p>
        </div>

        <header class="sticky top-0 z-50 glass-header text-white px-6 py-4 flex justify-between items-center shadow-lg no-print">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-md border border-white/30">
                    <span class="text-xl font-bold font-serif italic">G</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight font-serif uppercase leading-none">GUBECH</h1>
                    <p class="text-[8px] opacity-70 font-bold uppercase tracking-widest mt-1">Gestión Premium</p>
                </div>
            </div>
            <div id="connection-status" class="flex items-center gap-2 bg-black/10 px-3 py-1 rounded-full border border-white/10">
                <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
            </div>
        </header>

        <main id="main-content" class="flex-1 pb-24 overflow-y-auto bg-slate-50/50"></main>

        <!-- Toasts y Modales -->
        <div id="toast" class="hidden fixed top-24 left-1/2 -translate-x-1/2 z-[110] px-6 py-3 rounded-2xl shadow-2xl bg-slate-900 text-white text-sm font-medium animate-fade-in no-print"></div>

        <div id="confirm-modal" class="hidden fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-6 no-print">
            <div class="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl animate-fade-in">
                <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center text-red-500 mb-4">
                    <i data-lucide="alert-triangle"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2">¿Eliminar registro?</h3>
                <p class="text-sm text-gray-500 mb-6">Esta acción no se puede deshacer.</p>
                <div class="flex gap-3">
                    <button id="cancel-btn" class="flex-1 py-3 bg-gray-50 text-gray-600 font-bold rounded-2xl text-sm">No</button>
                    <button id="confirm-btn" class="flex-1 py-3 bg-red-500 text-white font-bold rounded-2xl text-sm shadow-lg shadow-red-100">Sí, eliminar</button>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 w-full max-w-[480px] bg-white/80 backdrop-blur-xl border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50 no-print">
            <button onclick="router.navigate('home')" class="nav-item flex flex-col items-center gap-1 text-gray-400" id="nav-home">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Inicio</span>
            </button>
            <button onclick="router.navigate('calendar')" class="nav-item flex flex-col items-center gap-1 text-gray-400" id="nav-calendar">
                <i data-lucide="calendar" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Agenda</span>
            </button>
            <div class="relative -mt-10">
                <button onclick="router.navigate('new')" class="w-14 h-14 bg-pink-600 rounded-full flex items-center justify-center text-white shadow-lg border-4 border-white active:scale-90 transition-all">
                    <i data-lucide="plus" class="w-8 h-8"></i>
                </button>
            </div>
            <button onclick="router.navigate('stats')" class="nav-item flex flex-col items-center gap-1 text-gray-400" id="nav-stats">
                <i data-lucide="pie-chart" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Finanzas</span>
            </button>
            <button onclick="router.navigate('clients')" class="nav-item flex flex-col items-center gap-1 text-gray-400" id="nav-clients">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Clientes</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0lLFHxRrEe27lMcn-3dcCYGFU7Cp4y0w",
            authDomain: "gubech2.firebaseapp.com",
            projectId: "gubech2",
            storageBucket: "gubech2.firebasestorage.app",
            messagingSenderId: "213017328047",
            appId: "1:213017328047:web:e665ddd73230afd79b575a"
        };

        const appId = 'gub-agenda-v3-pro';
        let db, auth, user;
        let appointments = [];
        let editingId = null;

        window.router = {
            current: 'home',
            navigate: (view, id = null) => {
                router.current = view;
                editingId = id;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'text-pink-600'));
                const activeNav = document.getElementById(`nav-${view}`);
                if(activeNav) activeNav.classList.add('active', 'text-pink-600');
                render();
            }
        };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2000);
        };

        const init = async () => {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            await signInAnonymously(auth);
            onAuthStateChanged(auth, u => {
                if(u) {
                    user = u;
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'appointments'), (snap) => {
                        appointments = snap.docs.map(d => ({ id: d.id, status: 'pendiente', ...d.data() }));
                        render();
                        document.getElementById('loading-screen').classList.add('opacity-0', 'pointer-events-none');
                    });
                }
            });
        };

        window.handleSubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd.entries());
            data.price = parseFloat(data.price) || 0;
            data.kitPrice = parseFloat(data.kitPrice) || 0;
            
            try {
                if(editingId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appointments', editingId), data);
                    showToast("Actualizado");
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'appointments'), { 
                        ...data, 
                        status: 'pendiente',
                        createdAt: serverTimestamp() 
                    });
                    showToast("Agendado");
                }
                router.navigate('home');
            } catch(e) { showToast("Error al guardar"); }
        };

        window.markAsDone = async (id, e) => {
            if(e) e.stopPropagation();
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appointments', id), { 
                    status: 'realizada' 
                });
                showToast("¡Trabajo Realizado!");
            } catch(err) { showToast("Error"); }
        };

        let delObj = null;
        window.deleteItem = (id, e) => {
            if(e) e.stopPropagation();
            delObj = id;
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        document.getElementById('cancel-btn').onclick = () => document.getElementById('confirm-modal').classList.add('hidden');
        document.getElementById('confirm-btn').onclick = async () => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appointments', delObj));
            document.getElementById('confirm-modal').classList.add('hidden');
            showToast("Eliminado");
        };

        const calc = (list) => {
            return list.reduce((acc, curr) => {
                const p = parseFloat(curr.price) || 0;
                const k = parseFloat(curr.kitPrice) || 0;
                const total = p + k;
                
                acc.s += p;
                acc.k += k;
                acc.t += total;
                
                if(curr.status === 'realizada') acc.cobrado += total;
                else acc.pendiente += total;
                
                return acc;
            }, { s: 0, k: 0, t: 0, cobrado: 0, pendiente: 0 });
        };

        const renderCard = (a, showDate = false) => {
            const isDone = a.status === 'realizada';
            return `
                <div onclick="router.navigate('new', '${a.id}')" class="bg-white border-l-4 ${isDone ? 'card-done' : (a.price > 0 ? 'border-pink-500' : 'border-indigo-500')} rounded-2xl p-4 shadow-sm flex items-center justify-between mb-3 no-print">
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-sm font-bold ${isDone ? 'text-green-800' : 'text-slate-800'}">${a.clientName}</span>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">${showDate ? a.date + ' • ' : ''}${a.time} HS</span>
                        </div>
                        <div class="text-[11px] font-medium text-slate-500 mb-3">
                            ${a.price > 0 ? a.service : 'Venta de Kit'}
                            ${isDone ? '<span class="ml-2 bg-green-200 text-green-800 px-2 py-0.5 rounded-full text-[9px] font-black">✓ REALIZADA</span>' : ''}
                        </div>
                        <div class="flex flex-wrap gap-2 items-center">
                            ${a.price > 0 ? `<div class="bg-pink-50 text-pink-600 px-2 py-1 rounded-lg text-[10px] font-bold">$${a.price}</div>` : ''}
                            ${a.kitPrice > 0 ? `<div class="bg-indigo-50 text-indigo-600 px-2 py-1 rounded-lg text-[10px] font-bold">Kit: $${a.kitPrice}</div>` : ''}
                            
                            ${!isDone ? `
                                <button onclick="markAsDone('${a.id}', event)" class="ml-auto bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center gap-1 shadow-md active:scale-95 transition-all border-b-4 border-green-700">
                                    <i data-lucide="check-circle" class="w-3 h-3"></i> Realizada
                                </button>
                            ` : ''}
                        </div>
                    </div>
                    <button onclick="deleteItem('${a.id}', event)" class="p-2 text-slate-200 hover:text-red-500 ml-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `;
        };

        function render() {
            const container = document.getElementById('main-content');
            const today = new Date().toISOString().split('T')[0];
            
            if (router.current === 'home') {
                const list = appointments.filter(a => a.date === today);
                const b = calc(list);
                container.innerHTML = `
                    <div class="p-6 animate-fade-in no-print">
                        <div class="bg-white rounded-[2rem] p-6 shadow-xl mb-6 border border-pink-50">
                            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Caja de Hoy</h2>
                            <div class="grid grid-cols-2 gap-4 mb-4">
                                <div class="bg-green-50 p-3 rounded-2xl border border-green-100">
                                    <p class="text-[9px] font-bold text-green-600 uppercase">Cobrado</p>
                                    <p class="text-2xl font-bold font-serif text-green-700">$${b.cobrado}</p>
                                </div>
                                <div class="bg-slate-50 p-3 rounded-2xl border border-slate-200">
                                    <p class="text-[9px] font-bold text-slate-400 uppercase">Pendiente</p>
                                    <p class="text-2xl font-bold font-serif text-slate-600">$${b.pendiente}</p>
                                </div>
                            </div>
                            <div class="pt-4 border-t border-slate-50 flex justify-between items-center">
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase">Proyección Total</p>
                                    <p class="text-xl font-bold text-pink-600">$${b.t}</p>
                                </div>
                                <span class="bg-pink-100 text-pink-700 text-[10px] px-3 py-1 rounded-full font-black">${list.length} TURNOS</span>
                            </div>
                        </div>
                        <h3 class="font-bold text-slate-800 mb-4 px-2 flex items-center gap-2">
                            <i data-lucide="calendar-days" class="w-4 h-4 text-pink-500"></i> Turnos para hoy
                        </h3>
                        ${list.length ? list.map(a => renderCard(a)).join('') : '<p class="text-center py-20 text-slate-300 italic">No hay nada para hoy</p>'}
                    </div>
                `;
            } else if (router.current === 'stats') {
                const b = calc(appointments);
                container.innerHTML = `
                    <div class="p-6 animate-fade-in no-print">
                        <h2 class="text-xl font-bold font-serif text-slate-800 mb-6">Finanzas Globales</h2>
                        
                        <div class="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-2xl mb-6 overflow-hidden relative">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-pink-500/20 rounded-full -mr-16 -mt-16 blur-3xl"></div>
                            <p class="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-2">Total en Mano (Cobrado)</p>
                            <h3 class="text-5xl font-bold font-serif mb-2">$${b.cobrado}</h3>
                            <p class="text-[10px] opacity-40">De un proyectado total de $${b.t}</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <div class="bg-white p-5 rounded-3xl border border-pink-100 shadow-sm">
                                <p class="text-[10px] font-bold text-pink-400 uppercase mb-1">Servicios</p>
                                <p class="text-xl font-bold text-slate-800 font-serif">$${b.s}</p>
                            </div>
                            <div class="bg-white p-5 rounded-3xl border border-indigo-100 shadow-sm">
                                <p class="text-[10px] font-bold text-indigo-400 uppercase mb-1">Ventas Kits</p>
                                <p class="text-xl font-bold text-slate-800 font-serif">$${b.k}</p>
                            </div>
                        </div>

                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 px-2">Movimientos Recientes</h4>
                        <div class="space-y-3">
                            ${appointments.sort((a,b) => b.date.localeCompare(a.date)).slice(0, 10).map(a => `
                                <div class="bg-white p-4 rounded-2xl border border-slate-50 flex justify-between items-center shadow-sm">
                                    <div>
                                        <p class="text-sm font-bold text-slate-800">${a.clientName}</p>
                                        <p class="text-[9px] text-slate-400 uppercase">${a.date}</p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-sm font-bold ${a.status === 'realizada' ? 'text-green-600' : 'text-slate-300'}">$${(parseFloat(a.price)+parseFloat(a.kitPrice))}</p>
                                        <span class="text-[8px] font-black uppercase">${a.status}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (router.current === 'calendar') {
                const sorted = appointments.sort((a,b) => b.date.localeCompare(a.date) || b.time.localeCompare(a.time));
                let lastDate = "";
                container.innerHTML = `
                    <div class="p-6 animate-fade-in no-print">
                        <h2 class="text-xl font-bold font-serif mb-6 text-slate-800">Agenda Completa</h2>
                        <div class="space-y-1">
                            ${sorted.map(a => {
                                let header = "";
                                if(a.date !== lastDate) {
                                    header = `<div class="mt-8 mb-3 px-2 flex items-center gap-2">
                                                <div class="w-8 h-8 rounded-lg bg-pink-100 flex items-center justify-center text-pink-600"><i data-lucide="calendar" class="w-4 h-4"></i></div>
                                                <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">${a.date}</span>
                                              </div>`;
                                    lastDate = a.date;
                                }
                                return header + renderCard(a, false);
                            }).join('') || '<p class="text-center py-20 text-slate-300">Agenda vacía</p>'}
                        </div>
                    </div>
                `;
            } else if (router.current === 'new') {
                const a = editingId ? appointments.find(x => x.id === editingId) : null;
                container.innerHTML = `
                    <div class="p-6 animate-fade-in no-print">
                        <h2 class="text-xl font-bold font-serif mb-6">${a ? 'Editar Registro' : 'Nuevo Registro'}</h2>
                        <form onsubmit="handleSubmit(event)" class="space-y-5">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1">Clienta</label>
                                <input name="clientName" value="${a?.clientName || ''}" required class="w-full bg-white border border-slate-100 rounded-2xl p-4 outline-none shadow-sm" placeholder="Nombre completo">
                            </div>
                            <div class="bg-pink-50/30 p-5 rounded-[2rem] border border-pink-100">
                                <label class="block text-[10px] font-bold text-pink-400 uppercase mb-1">Servicio de Alisado</label>
                                <div class="grid grid-cols-2 gap-4">
                                    <select name="service" class="w-full bg-white border border-pink-100 rounded-2xl p-4 outline-none text-sm">
                                        <option value="Alisado" ${a?.service === 'Alisado' ? 'selected' : ''}>Alisado</option>
                                        <option value="Keratina" ${a?.service === 'Keratina' ? 'selected' : ''}>Keratina</option>
                                        <option value="Botox" ${a?.service === 'Botox' ? 'selected' : ''}>Botox</option>
                                        <option value="Ninguno" ${a?.price === 0 ? 'selected' : ''}>Ninguno</option>
                                    </select>
                                    <input name="price" type="number" value="${a?.price || ''}" class="w-full bg-white border border-pink-100 rounded-2xl p-4 outline-none text-sm" placeholder="Precio $">
                                </div>
                            </div>
                            <div class="bg-indigo-50/50 p-5 rounded-[2rem] border border-indigo-100">
                                <label class="block text-[10px] font-bold text-indigo-400 uppercase mb-1">Kit de Mantenimiento</label>
                                <input name="kitPrice" type="number" value="${a?.kitPrice || ''}" class="w-full bg-white border border-indigo-100 rounded-2xl p-4 outline-none text-sm" placeholder="Precio Kit $">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <input name="date" type="date" value="${a?.date || today}" required class="w-full bg-white border border-slate-100 rounded-2xl p-4 outline-none shadow-sm text-sm">
                                <input name="time" type="time" value="${a?.time || '10:00'}" required class="w-full bg-white border border-slate-100 rounded-2xl p-4 outline-none shadow-sm text-sm">
                            </div>
                            <button type="submit" class="w-full bg-pink-600 text-white py-5 rounded-3xl font-bold shadow-lg shadow-pink-100 active:scale-95 transition-all">
                                ${a ? 'Actualizar' : 'Agendar'}
                            </button>
                        </form>
                    </div>
                `;
            } else if (router.current === 'clients') {
                const uniques = [...new Set(appointments.map(a => a.clientName))];
                container.innerHTML = `
                    <div class="p-6 animate-fade-in no-print">
                        <h2 class="text-xl font-bold font-serif mb-6 text-slate-800">Directorio</h2>
                        <div class="grid grid-cols-1 gap-3">
                            ${uniques.map(c => `
                                <div class="bg-white p-4 rounded-2xl border border-slate-50 flex items-center gap-4 shadow-sm">
                                    <div class="w-10 h-10 rounded-full bg-pink-600 text-white flex items-center justify-center font-serif italic text-lg">${c.charAt(0)}</div>
                                    <span class="text-sm font-bold text-slate-800">${c}</span>
                                </div>
                            `).join('') || '<p class="text-center py-20 text-slate-300 italic">No hay clientas</p>'}
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
