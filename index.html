<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUBECH Agenda Pro - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f1f5f9; 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 0px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .nav-item.active { color: #db2777; }
        .glass-header {
            background: linear-gradient(135deg, #831843 0%, #be185d 50%, #db2777 100%);
        }
        /* Modal Animation */
        .modal-overlay {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <div id="app-container" class="w-full max-w-[480px] bg-white min-h-screen shadow-2xl relative flex flex-col">
        
        <!-- Pantalla de Carga -->
        <div id="loading-screen" class="absolute inset-0 z-[100] bg-pink-50 flex flex-col items-center justify-center transition-opacity duration-500">
            <div class="animate-spin text-pink-600 mb-4">
                <i data-lucide="loader-2" class="w-12 h-12"></i>
            </div>
            <p class="text-pink-800 font-serif font-bold text-2xl tracking-tighter">GUBECH</p>
            <p class="text-pink-400 text-[10px] uppercase tracking-widest mt-2 font-bold">Conectando a Firebase...</p>
        </div>

        <!-- Cabecera -->
        <header class="sticky top-0 z-50 glass-header text-white px-6 py-4 flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-md border border-white/30">
                    <span class="text-xl font-bold font-serif italic">G</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight font-serif uppercase leading-none">GUBECH</h1>
                    <p class="text-[8px] opacity-70 font-bold uppercase tracking-widest mt-1">Cloud Sync Active</p>
                </div>
            </div>
            <div id="connection-status" class="flex items-center gap-2 bg-black/10 px-3 py-1 rounded-full border border-white/10">
                <div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Syncing...</span>
            </div>
        </header>

        <!-- Contenido Principal -->
        <main id="main-content" class="flex-1 pb-24 overflow-y-auto overflow-x-hidden bg-slate-50/50"></main>

        <!-- Notificaciones Toast -->
        <div id="toast" class="hidden fixed top-24 left-1/2 -translate-x-1/2 z-[110] px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 bg-slate-900 text-white text-sm font-medium animate-fade-in border border-white/10"></div>

        <!-- Modal de Confirmación -->
        <div id="confirm-modal" class="hidden fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-6">
            <div class="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl animate-fade-in border border-gray-100">
                <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center text-red-500 mb-4">
                    <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2">¿Eliminar registro?</h3>
                <p class="text-sm text-gray-500 mb-6 leading-relaxed">Esta acción es permanente y se sincronizará inmediatamente en la nube.</p>
                <div class="flex gap-3">
                    <button id="cancel-btn" class="flex-1 py-3 px-4 bg-gray-50 text-gray-600 font-bold rounded-2xl active:scale-95 transition-all text-sm">Cancelar</button>
                    <button id="confirm-btn" class="flex-1 py-3 px-4 bg-red-500 text-white font-bold rounded-2xl active:scale-95 transition-all shadow-lg shadow-red-100 text-sm">Eliminar</button>
                </div>
            </div>
        </div>

        <!-- Navegación Inferior -->
        <nav class="fixed bottom-0 w-full max-w-[480px] bg-white/80 backdrop-blur-xl border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50">
            <button onclick="router.navigate('home')" class="nav-item flex flex-col items-center gap-1 text-gray-400 transition-colors" id="nav-home">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Inicio</span>
            </button>
            <button onclick="router.navigate('calendar')" class="nav-item flex flex-col items-center gap-1 text-gray-400 transition-colors" id="nav-calendar">
                <i data-lucide="calendar" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Agenda</span>
            </button>
            <div class="relative -mt-10">
                <button onclick="router.navigate('new')" class="w-14 h-14 bg-pink-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-pink-200 active:scale-90 transition-all border-4 border-white">
                    <i data-lucide="plus" class="w-8 h-8"></i>
                </button>
            </div>
            <button onclick="router.navigate('clients')" class="nav-item flex flex-col items-center gap-1 text-gray-400 transition-colors" id="nav-clients">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Clientes</span>
            </button>
            <button onclick="showToast('☁️ Firebase Cloud Activo')" class="flex flex-col items-center gap-1 text-gray-400">
                <i data-lucide="cloud" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Cloud</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 🔑 TU CONFIGURACIÓN ORIGINAL MANTENIDA
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD0lLFHxRrEe27lMcn-3dcCYGFU7Cp4y0w",
            authDomain: "gubech2.firebaseapp.com",
            projectId: "gubech2",
            storageBucket: "gubech2.firebasestorage.app",
            messagingSenderId: "213017328047",
            appId: "1:213017328047:web:e665ddd73230afd79b575a",
            measurementId: "G-4DSZCFS9MF"
        };

        const appId = 'gub-agenda-pro-html';
        let db, auth, user;
        let appointments = [];
        let clients = [];

        // Router
        window.router = {
            current: 'home',
            navigate: function(view) {
                this.current = view;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'text-pink-600'));
                const activeNav = document.getElementById(`nav-${view}`);
                if(activeNav) activeNav.classList.add('active', 'text-pink-600');
                render();
            }
        };

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };

        const withRetry = async (fn, maxRetries = 5) => {
            for (let i = 0; i < maxRetries; i++) {
                try { return await fn(); } 
                catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        };

        const initApp = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                await withRetry(() => signInAnonymously(auth));

                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        user = u;
                        updateStatusUI(true);
                        setupDataListeners();
                    }
                });
            } catch (error) {
                console.error("Firebase Error:", error);
                updateStatusUI(false);
            }
        };

        const updateStatusUI = (online) => {
            const statusDiv = document.getElementById('connection-status');
            statusDiv.innerHTML = online ? 
                `<div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div><span class="text-[9px] font-bold uppercase tracking-tighter">En Línea</span>` :
                `<div class="w-2 h-2 bg-red-400 rounded-full"></div><span class="text-[9px] font-bold uppercase tracking-tighter">Error</span>`;
        };

        const setupDataListeners = () => {
            const appRef = collection(db, 'artifacts', appId, 'public', 'data', 'appointments');
            onSnapshot(appRef, (snap) => {
                appointments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
                document.getElementById('loading-screen').classList.add('opacity-0', 'pointer-events-none');
            });

            const cliRef = collection(db, 'artifacts', appId, 'public', 'data', 'clients');
            onSnapshot(cliRef, (snap) => {
                clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            });
        };

        window.addAppointment = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                await withRetry(() => addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'appointments'), {
                    ...data,
                    price: parseFloat(data.price),
                    createdAt: serverTimestamp()
                }));

                const clientExists = clients.find(c => c.name.toLowerCase() === data.clientName.toLowerCase());
                if (!clientExists) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), {
                        name: data.clientName,
                        createdAt: serverTimestamp()
                    });
                }

                showToast("✅ Sincronizado en la nube");
                router.navigate('home');
            } catch (err) {
                showToast("Error al guardar");
            }
        };

        // Lógica de eliminación con Modal de Confirmación
        let pendingDelete = null;

        window.deleteDocItem = (col, id) => {
            pendingDelete = { col, id };
            const modal = document.getElementById('confirm-modal');
            modal.classList.remove('hidden');
        };

        // Cerrar modal
        document.getElementById('cancel-btn').onclick = () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            pendingDelete = null;
        };

        // Ejecutar eliminación
        document.getElementById('confirm-btn').onclick = async () => {
            if (!pendingDelete) return;
            const { col, id } = pendingDelete;
            
            document.getElementById('confirm-modal').classList.add('hidden');
            
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
                showToast("Registro eliminado");
            } catch (e) {
                showToast("Error al eliminar");
            }
            pendingDelete = null;
        };

        function render() {
            const container = document.getElementById('main-content');
            const today = new Date().toISOString().split('T')[0];

            if (router.current === 'home') {
                const todayApps = appointments.filter(a => a.date === today);
                const revenue = todayApps.reduce((acc, c) => acc + c.price, 0);

                container.innerHTML = `
                    <div class="animate-fade-in">
                        <div class="relative h-48 w-full overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1562322140-8baeececf3df?w=800&q=80" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-pink-900/90 to-transparent flex flex-col justify-end p-6 text-white">
                                <h2 class="text-2xl font-bold font-serif">Panel Cloud</h2>
                                <p class="text-[10px] opacity-70 italic uppercase tracking-widest font-bold">Datos en tiempo real</p>
                            </div>
                        </div>
                        <div class="px-6 -mt-8 relative grid grid-cols-2 gap-4">
                            <div class="bg-white rounded-2xl p-4 shadow-lg text-center border border-pink-50">
                                <div class="text-2xl font-bold font-serif text-pink-600">${todayApps.length}</div>
                                <div class="text-[9px] uppercase font-bold text-gray-400">Citas Hoy</div>
                            </div>
                            <div class="bg-white rounded-2xl p-4 shadow-lg text-center border border-pink-50">
                                <div class="text-2xl font-bold font-serif text-pink-600">$${revenue}</div>
                                <div class="text-[9px] uppercase font-bold text-gray-400">Ingreso Hoy</div>
                            </div>
                        </div>
                        <div class="p-6">
                            <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <i data-lucide="list" class="w-4 h-4 text-pink-500"></i> Servicios de hoy
                            </h3>
                            <div class="space-y-3">
                                ${todayApps.length ? todayApps.map(renderCard).join('') : '<div class="text-center py-10 text-gray-300 italic text-sm">No hay servicios registrados hoy</div>'}
                            </div>
                        </div>
                    </div>
                `;
            } else if (router.current === 'new') {
                container.innerHTML = `
                    <div class="p-6 animate-fade-in">
                        <h2 class="text-xl font-bold font-serif text-gray-800 mb-6">Agendar Servicio</h2>
                        <form onsubmit="addAppointment(event)" class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Nombre Clienta</label>
                                <input name="clientName" required class="w-full bg-white border border-gray-100 rounded-2xl p-4 outline-none focus:border-pink-500 shadow-sm" placeholder="Ej: Marcela Pérez">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Servicio</label>
                                    <select name="service" class="w-full bg-white border border-gray-100 rounded-2xl p-4 outline-none shadow-sm appearance-none">
                                        <option value="Alisado">Alisado Pro</option>
                                        <option value="Keratina">Keratina</option>
                                        <option value="Botox">Botox Capilar</option>
                                        <option value="Corte">Corte + Secado</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Precio ($)</label>
                                    <input name="price" type="number" required class="w-full bg-white border border-gray-100 rounded-2xl p-4 outline-none shadow-sm">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Fecha</label>
                                    <input name="date" type="date" value="${today}" required class="w-full bg-white border border-gray-100 rounded-2xl p-4 outline-none shadow-sm">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Hora</label>
                                    <input name="time" type="time" value="09:00" required class="w-full bg-white border border-gray-100 rounded-2xl p-4 outline-none shadow-sm">
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-pink-600 text-white py-4 rounded-3xl font-bold shadow-lg shadow-pink-100 mt-4 active:scale-95 transition-all">AGENDAR EN LA NUBE</button>
                        </form>
                    </div>
                `;
            } else if (router.current === 'calendar') {
                container.innerHTML = `
                    <div class="p-6 animate-fade-in">
                        <h2 class="text-xl font-bold font-serif text-gray-800 mb-6">Agenda Completa</h2>
                        <div class="space-y-3">
                            ${appointments.sort((a,b) => b.date.localeCompare(a.date)).map(renderCard).join('') || '<p class="text-center py-20 text-gray-300">Sin registros</p>'}
                        </div>
                    </div>
                `;
            } else if (router.current === 'clients') {
                container.innerHTML = `
                    <div class="p-6 animate-fade-in">
                        <h2 class="text-xl font-bold font-serif text-gray-800 mb-6">Directorio</h2>
                        <div class="space-y-3">
                            ${clients.map(c => `
                                <div class="bg-white p-4 rounded-2xl border border-gray-50 flex items-center gap-4 shadow-sm">
                                    <div class="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center text-pink-600 font-bold uppercase">${c.name.charAt(0)}</div>
                                    <div class="flex-1">
                                        <div class="text-sm font-bold text-gray-800">${c.name}</div>
                                        <div class="text-[9px] text-gray-400 uppercase tracking-tighter">Sincronizada</div>
                                    </div>
                                    <button onclick="deleteDocItem('clients', '${c.id}')" class="p-2 text-gray-200 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            `).join('') || '<p class="text-center py-20 text-gray-300">No hay clientes</p>'}
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function renderCard(app) {
            return `
                <div class="bg-white border-l-4 border-pink-500 rounded-2xl p-4 shadow-sm flex items-center gap-4 hover:shadow-md transition-shadow">
                    <div class="flex-1">
                        <div class="text-sm font-bold text-gray-800">${app.clientName}</div>
                        <div class="text-[10px] text-gray-400 uppercase font-bold">${app.service} • ${app.time} HS</div>
                        <div class="text-[11px] font-bold text-green-600 mt-1">$ ${app.price}</div>
                    </div>
                    <button onclick="deleteDocItem('appointments', '${app.id}')" class="p-2 text-gray-200 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `;
        }

        window.onload = initApp;
    </script>
</body>
</html>
