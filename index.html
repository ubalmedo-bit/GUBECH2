
                        <!DOCTYPE html>
                        <html lang="en">
                        <head>
                            <meta charset="UTF-8">
                            <meta name="viewport" content="width=device-width, initial-scale=1.0">

                body {
                  background-color: white; /* Ensure the iframe has a white background */
                }

                
              </style>
                        </head>
                        <body>
                            <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUBECH Agenda Pro - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .font-serif { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 0px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen flex justify-center">
        <div class="w-full max-w-[480px] bg-white min-h-screen shadow-2xl relative flex flex-col">
            
            <!-- Pantalla de Carga -->
            <div id="loading-screen" class="absolute inset-0 z-[100] bg-pink-50 flex flex-col items-center justify-center">
                <div class="animate-spin text-pink-600 mb-4"><i data-lucide="loader-2" class="w-12 h-12"></i></div>
                <p class="text-pink-800 font-serif font-bold text-xl">GUBECH</p>
                <p class="text-pink-400 text-[10px] uppercase tracking-widest mt-2">Conectando a Cloud...</p>
            </div>

            <!-- Cabecera -->
            <header class="sticky top-0 z-50 bg-gradient-to-r from-pink-900 via-pink-700 to-pink-600 text-white px-6 py-4 flex justify-between items-center shadow-md">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm border border-white/30">
                        <span class="text-xl font-bold font-serif italic">G</span>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight font-serif uppercase leading-none">GUBECH</h1>
                        <p class="text-[8px] opacity-60 font-bold uppercase tracking-widest mt-1">Cloud Sync</p>
                    </div>
                </div>
                <div id="connection-status" class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold opacity-70 uppercase tracking-tighter">Conectando...</span>
                </div>
            </header>

            <!-- Contenido Principal -->
            <main id="main-content" class="flex-1 pb-24 overflow-y-auto overflow-x-hidden"></main>

            <!-- Notificaciones Toast -->
            <div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-[110] px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 bg-slate-900 text-white text-sm font-medium animate-fade-in"></div>

            <!-- Navegación Inferior -->
            <nav class="fixed bottom-0 w-full max-w-[480px] bg-white/90 backdrop-blur-xl border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50">
                <button onclick="router.navigate('home')" class="nav-item flex flex-col items-center gap-1 text-gray-400" id="nav-home">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Inicio</span>
                </button>
                <button onclick="router.navigate('calendar')" class="nav-item flex flex-col items-center gap-1 text-gray-400" id="nav-calendar">
                    <i data-lucide="calendar" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Agenda</span>
                </button>
                <div class="relative -mt-10">
                    <button onclick="router.navigate('new')" class="w-14 h-14 bg-pink-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-pink-300 active:scale-90 transition-all border-4 border-white">
                        <i data-lucide="plus" class="w-8 h-8"></i>
                    </button>
                </div>
                <button onclick="router.navigate('clients')" class="nav-item flex flex-col items-center gap-1 text-gray-400" id="nav-clients">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Clientes</span>
                </button>
                <button onclick="showToast('☁️ Firebase Cloud activo')" class="flex flex-col items-center gap-1 text-gray-400">
                    <i data-lucide="cloud" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Cloud</span>
                </button>
            </nav>
        </div>
    </div>

    <!-- Scripts de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 🔑 CONFIGURACIÓN DE FIREBASE - ¡REEMPLAZA CON TUS CREDENCIALES!
        // ==========================================
        // 1. Ve a https://console.firebase.google.com
        // 2. Crea un proyecto nuevo
        // 3. Agrega una app web (</>)
        // 4. Copia las credenciales y reemplaza abajo:
        const firebaseConfig = {
            apiKey: "TU_API_KEY_AQUI",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        // ID único para separar tus datos en la nube
        const appId = 'gub-agenda-pro-html';

        // ==========================================
        // INICIALIZACIÓN DE FIREBASE
        // ==========================================
        let app, auth, db;
        let appointments = [];
        let clients = [];
        let isAuthReady = false;

        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            console.log('✅ Firebase inicializado correctamente');
        } catch(e) {
            console.error('❌ Error inicializando Firebase:', e);
            document.getElementById('loading-screen').innerHTML = `
                <div class="text-center p-8">
                    <p class="text-pink-600 font-bold mb-4">⚠️ Configuración requerida</p>
                    <p class="text-gray-500 text-sm">Reemplaza firebaseConfig con tus credenciales de Firebase Console</p>
                </div>
            `;
        }

        // Router y Navegación
        window.router = {
            current: 'home',
            navigate: function(view) {
                this.current = view;
                document.querySelectorAll('.nav-item').forEach(el => {
                    el.classList.remove('text-pink-600');
                    el.classList.add('text-gray-400');
                });
                const activeNav = document.getElementById(`nav-${view}`);
                if(activeNav) {
                    activeNav.classList.remove('text-gray-400');
                    activeNav.classList.add('text-pink-600');
                }
                render();
            }
        };

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };

        // Reintento exponencial para conexiones móviles
        const withRetry = async (fn, maxRetries = 5) => {
            for (let i = 0; i < maxRetries; i++) {
                try { return await fn(); } 
                catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        };

        // Inicio de la App y Auth
        const initApp = async () => {
            try {
                await withRetry(async () => {
                    await signInAnonymously(auth);
                });

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        isAuthReady = true;
                        updateStatusUI(true);
                        setupDataListeners();
                        console.log('✅ Usuario autenticado:', user.uid);
                    } else {
                        isAuthReady = false;
                        updateStatusUI(false);
                        showToast("Sesión perdida...");
                    }
                });
            } catch (error) {
                console.error("Error en conexión Firebase:", error);
                showToast("Error de servidor: " + error.message);
                updateStatusUI(false);
            }
        };

        const updateStatusUI = (online) => {
            const statusDiv = document.getElementById('connection-status');
            if (online) {
                statusDiv.innerHTML = `
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold opacity-70 uppercase tracking-tighter text-white">Cloud OK</span>
                `;
            } else {
                statusDiv.innerHTML = `
                    <div class="w-2 h-2 bg-red-400 rounded-full"></div>
                    <span class="text-[10px] font-bold opacity-70 uppercase tracking-tighter text-white">Error</span>
                `;
            }
        };

        const setupDataListeners = () => {
            // Escuchar cambios en tiempo real en appointments
            const appRef = collection(db, 'artifacts', appId, 'public', 'data', 'appointments');
            onSnapshot(appRef, (snap) => {
                appointments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                console.log('📋 Appointments actualizados:', appointments.length);
                render();
                document.getElementById('loading-screen').classList.add('hidden');
            }, (err) => {
                console.error("Snapshot Error Appointments:", err);
                showToast("Error al cargar citas");
            });

            // Escuchar cambios en tiempo real en clients
            const cliRef = collection(db, 'artifacts', appId, 'public', 'data', 'clients');
            onSnapshot(cliRef, (snap) => {
                clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                console.log('👥 Clients actualizados:', clients.length);
                if(router.current === 'clients') render();
            }, (err) => {
                console.error("Snapshot Error Clients:", err);
            });
        };

        // CRUD con sincronización
        window.addAppointment = async (e) => {
            e.preventDefault();
            if (!isAuthReady) return showToast("Conectando al servidor...");
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                await withRetry(() => addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'appointments'), {
                    ...data,
                    createdAt: new Date().toISOString()
                }));

                if(!clients.find(c => c.name && c.name.toLowerCase() === data.clientName.toLowerCase())) {
                    await withRetry(() => addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), {
                        name: data.clientName,
                        createdAt: new Date().toISOString()
                    }));
                }
                showToast("✅ Sincronizado con la Nube");
                router.navigate('home');
            } catch(e) { 
                showToast("❌ Error: " + e.message); 
            }
        };

        window.deleteApp = async (id) => {
            if (!isAuthReady) return showToast("Sin conexión...");
            try {
                await withRetry(() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appointments', id)));
                showToast("Registro eliminado");
            } catch (e) { showToast("Error al borrar"); }
        };

        window.deleteCli = async (id) => {
            if (!isAuthReady) return showToast("Sin conexión...");
            try {
                await withRetry(() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', id)));
                showToast("Cliente removido");
            } catch (e) { showToast("Error al borrar"); }
        };

        // Renderizado Dinámico
        function render() {
            const container = document.getElementById('main-content');
            if (!container) return;
            const today = new Date().toISOString().split('T')[0];
            
            if (router.current === 'home') {
                const todayApps = appointments.filter(a => a.date === today);
                const earnings = todayApps.reduce((acc, c) => acc + (parseFloat(c.price) || 0), 0);
                
                container.innerHTML = `
                    <div class="animate-fade-in">
                        <div class="relative h-48 w-full overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1562322140-8baeececf3df?w=800&q=80" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-pink-900/90 to-transparent flex flex-col justify-end p-6 text-white">
                                <h2 class="text-2xl font-bold font-serif">Panel Cloud</h2>
                                <p class="text-[10px] opacity-70 italic tracking-widest uppercase">Datos en tiempo real</p>
                            </div>
                        </div>
                        <div class="px-6 -mt-8 relative grid grid-cols-3 gap-3">
                            <div class="bg-white rounded-2xl p-4 shadow-lg text-center border border-pink-50">
                                <div class="text-2xl font-bold font-serif text-pink-600">${todayApps.length}</div>
                                <div class="text-[9px] uppercase font-bold text-gray-400">Hoy</div>
                            </div>
                            <div class="bg-white rounded-2xl p-4 shadow-lg text-center border border-pink-50">
                                <div class="text-2xl font-bold font-serif text-pink-600">${appointments.length}</div>
                                <div class="text-[9px] uppercase font-bold text-gray-400">Total</div>
                            </div>
                            <div class="bg-white rounded-2xl p-4 shadow-lg text-center border border-pink-50">
                                <div class="text-2xl font-bold font-serif text-pink-600">${clients.length}</div>
                                <div class="text-[9px] uppercase font-bold text-gray-400">Nube</div>
                            </div>
                        </div>
                        <div class="mx-6 mt-6 bg-pink-800 rounded-3xl p-6 text-white shadow-xl shadow-pink-200">
                            <div class="text-[10px] opacity-70 uppercase font-bold mb-1">Caja del Día</div>
                            <div class="text-3xl font-bold font-serif">$${earnings}</div>
                        </div>
                        <div class="px-6 mt-8">
                            <h3 class="font-bold text-gray-800 mb-4 flex justify-between items-center">
                                <span>Citas de Hoy</span>
                                <span class="text-[10px] text-pink-400 uppercase tracking-tighter">Actualizado</span>
                            </h3>
                            <div class="space-y-3">
                                ${todayApps.length ? todayApps.map(renderCard).join('') : '<div class="text-center py-10 text-gray-400 text-sm border-2 border-dashed rounded-2xl">No hay citas para hoy</div>'}
                            </div>
                        </div>
                    </div>
                `;
            } else if (router.current === 'new') {
                container.innerHTML = `
                    <div class="p-6 animate-fade-in">
                        <h2 class="text-xl font-bold font-serif text-gray-800 mb-6">Agendar Servicio</h2>
                        <form onsubmit="addAppointment(event)" class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nombre de Clienta</label>
                                <input name="clientName" required class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none focus:border-pink-500" placeholder="Ej: Marcela Pérez">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Servicio</label>
                                    <select name="service" required class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none focus:border-pink-500 appearance-none">
                                        <option value="Alisado">Alisado Pro</option>
                                        <option value="Keratina">Keratina</option>
                                        <option value="Botox">Botox Capilar</option>
                                        <option value="Corte">Corte + Secado</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Costo ($)</label>
                                    <input name="price" type="number" required class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none focus:border-pink-500">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Fecha</label>
                                    <input name="date" type="date" value="${today}" required class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Hora</label>
                                    <input name="time" type="time" value="09:00" required class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none">
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-pink-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-pink-200 mt-4 active:scale-95 transition-transform uppercase tracking-widest">Sincronizar Cita</button>
                        </form>
                    </div>
                `;
            } else if (router.current === 'calendar') {
                container.innerHTML = `
                    <div class="p-6 animate-fade-in">
                        <h2 class="text-xl font-bold font-serif text-gray-800 mb-6">Agenda Completa</h2>
                        <div class="space-y-3">
                            ${appointments.sort((a,b) => b.date.localeCompare(a.date)).map(renderCard).join('') || '<div class="text-center py-20 opacity-30 italic">Sin registros históricos</div>'}
                        </div>
                    </div>
                `;
            } else if (router.current === 'clients') {
                container.innerHTML = `
                    <div class="p-6 animate-fade-in">
                        <h2 class="text-xl font-bold font-serif text-gray-800 mb-6">Mis Clientas</h2>
                        <div class="space-y-3">
                            ${clients.map(c => `
                                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center gap-4 shadow-sm">
                                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-pink-100 to-pink-200 flex items-center justify-center text-pink-600 font-bold">${c.name ? c.name.charAt(0) : '?'}</div>
                                    <div class="flex-1">
                                        <div class="text-sm font-bold text-gray-800">${c.name}</div>
                                        <div class="text-[10px] text-gray-400 italic">Guardado en Nube</div>
                                    </div>
                                    <button onclick="deleteCli('${c.id}')" class="p-2 text-gray-200 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            `).join('') || '<div class="text-center py-20 opacity-30 text-sm">Lista de clientes vacía</div>'}
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function renderCard(app) {
            const datePart = app.date ? app.date.split('-') : ['00','00','00'];
            return `
                <div class="bg-white border-l-4 border-pink-500 rounded-2xl p-4 shadow-sm flex items-center gap-4 transition-all">
                    <div class="bg-pink-50 rounded-xl p-2 min-w-[50px] text-center">
                        <div class="text-pink-600 font-bold leading-none">${datePart[2]}</div>
                        <div class="text-[8px] text-pink-300 font-bold uppercase">${app.date ? new Date(app.date + 'T00:00:00').toLocaleString('es', {month: 'short'}) : '---'}</div>
                    </div>
                    <div class="flex-1">
                        <div class="text-sm font-bold text-gray-800">${app.clientName}</div>
                        <div class="text-[10px] text-gray-500 font-medium">${app.service} • ${app.time}</div>
                        <div class="text-[10px] font-bold text-green-600 mt-1">$ ${app.price}</div>
                    </div>
                    <button onclick="deleteApp('${app.id}')" class="p-2 text-gray-200 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `;
        }

        // Inicio
        window.onload = () => {
            if (db) {
                initApp();
            } else {
                document.getElementById('loading-screen').innerHTML = `
                    <div class="text-center p-8">
                        <p class="text-pink-600 font-bold mb-4">⚠️ Configura Firebase</p>
                        <p class="text-gray-500 text-sm">Edita firebaseConfig con tus credenciales</p>
                    </div>
                `;
            }
            router.navigate('home');
        };
    </script>
</body>
</html>

                        </body>
                        </html>
