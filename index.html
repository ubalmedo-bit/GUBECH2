<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUBECH Agenda Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .font-serif { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 0px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen flex justify-center">
        <div class="w-full max-w-[480px] bg-white min-h-screen shadow-2xl relative flex flex-col">
            
            <!-- Loading Screen -->
            <div id="loading-screen" class="absolute inset-0 z-[100] bg-pink-50 flex flex-col items-center justify-center">
                <div class="animate-spin text-pink-600 mb-4"><i data-lucide="loader-2" class="w-12 h-12"></i></div>
                <p class="text-pink-800 font-serif font-bold text-xl">GUBECH</p>
                <p class="text-pink-400 text-[10px] uppercase tracking-widest mt-2">Sincronizando Nube...</p>
            </div>

            <!-- Header -->
            <header class="sticky top-0 z-50 bg-gradient-to-r from-pink-900 via-pink-700 to-pink-600 text-white px-6 py-4 flex justify-between items-center shadow-md">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-sm border border-white/30">
                        <span class="text-xl font-bold font-serif italic">G</span>
                    </div>
                    <h1 class="text-lg font-bold tracking-tight font-serif uppercase">GUBECH</h1>
                </div>
                <div id="connection-status" class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold opacity-70 uppercase tracking-tighter">Conectando...</span>
                </div>
            </header>

            <!-- Main Content Container -->
            <main id="main-content" class="flex-1 pb-24 overflow-y-auto overflow-x-hidden"></main>

            <!-- Toast Notifications -->
            <div id="toast" class="hidden fixed top-20 left-1/2 -translate-x-1/2 z-[110] px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 bg-slate-900 text-white text-sm font-medium animate-fade-in"></div>

            <!-- Bottom Navigation -->
            <nav class="fixed bottom-0 w-full max-w-[480px] bg-white/90 backdrop-blur-xl border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50">
                <button onclick="router.navigate('home')" class="nav-item flex flex-col items-center gap-1 text-gray-400" id="nav-home">
                    <i data-lucide="home" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Inicio</span>
                </button>
                <button onclick="router.navigate('calendar')" class="nav-item flex flex-col items-center gap-1 text-gray-400" id="nav-calendar">
                    <i data-lucide="calendar" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Agenda</span>
                </button>
                
                <div class="relative -mt-10">
                    <button onclick="router.navigate('new')" class="w-14 h-14 bg-pink-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-pink-300 active:scale-90 transition-all border-4 border-white">
                        <i data-lucide="plus" class="w-8 h-8"></i>
                    </button>
                </div>

                <button onclick="router.navigate('clients')" class="nav-item flex flex-col items-center gap-1 text-gray-400" id="nav-clients">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Clientes</span>
                </button>
                <button onclick="showToast('GUBECH Cloud Pro')" class="flex flex-col items-center gap-1 text-gray-400">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Info</span>
                </button>
            </nav>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración Global
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gub-agenda-pro-html';

        let appointments = [];
        let clients = [];
        let isAuthReady = false;

        // Router & UI Control
        window.router = {
            current: 'home',
            navigate: function(view) {
                this.current = view;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.replace('text-pink-600', 'text-gray-400'));
                const activeNav = document.getElementById(`nav-${view}`);
                if(activeNav) activeNav.classList.replace('text-gray-400', 'text-pink-600');
                render();
            }
        };

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };

        // Lógica de Autenticación y Carga de Datos (Regla 3)
        const initApp = async () => {
            try {
                // Paso 1: Autenticar primero
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // Paso 2: Escuchar cambios de estado de auth para activar listeners
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        isAuthReady = true;
                        updateStatusUI(true);
                        setupDataListeners();
                    } else {
                        isAuthReady = false;
                        updateStatusUI(false);
                    }
                });
            } catch (error) {
                console.error("Error inicializando app:", error);
                showToast("Error de conexión");
            }
        };

        const updateStatusUI = (online) => {
            const statusDiv = document.getElementById('connection-status');
            if (online) {
                statusDiv.innerHTML = `
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold opacity-70 uppercase tracking-tighter">Servidor Activo</span>
                `;
            } else {
                statusDiv.innerHTML = `
                    <div class="w-2 h-2 bg-red-400 rounded-full"></div>
                    <span class="text-[10px] font-bold opacity-70 uppercase tracking-tighter">Desconectado</span>
                `;
            }
        };

        const setupDataListeners = () => {
            // Listener de Citas (Ruta estricta Regla 1)
            const appRef = collection(db, 'artifacts', appId, 'public', 'data', 'appointments');
            onSnapshot(appRef, (snap) => {
                appointments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(router.current === 'home' || router.current === 'calendar') render();
                document.getElementById('loading-screen').classList.add('hidden');
            }, (err) => {
                console.error("Error en citas:", err);
            });

            // Listener de Clientes
            const cliRef = collection(db, 'artifacts', appId, 'public', 'data', 'clients');
            onSnapshot(cliRef, (snap) => {
                clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(router.current === 'clients') render();
            }, (err) => {
                console.error("Error en clientes:", err);
            });
        };

        // Acciones Globales expuestas a window
        window.addAppointment = async (e) => {
            e.preventDefault();
            if (!isAuthReady) return showToast("Esperando conexión...");
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'appointments'), {
                    ...data,
                    createdAt: new Date().toISOString()
                });

                if(!clients.find(c => c.name.toLowerCase() === data.clientName.toLowerCase())) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), {
                        name: data.clientName,
                        createdAt: new Date().toISOString()
                    });
                }
                showToast("Cita Guardada");
                router.navigate('home');
            } catch(e) { 
                console.error(e);
                showToast("Error al guardar"); 
            }
        };

        window.deleteApp = async (id) => {
            if (!isAuthReady) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appointments', id));
                showToast("Cita Eliminada");
            } catch (e) { console.error(e); }
        };

        window.deleteCli = async (id) => {
            if (!isAuthReady) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', id));
                showToast("Cliente Eliminado");
            } catch (e) { console.error(e); }
        };

        // Motor de Renderizado
        function render() {
            const container = document.getElementById('main-content');
            const today = new Date().toISOString().split('T')[0];
            
            if (router.current === 'home') {
                const todayApps = appointments.filter(a => a.date === today);
                const earnings = todayApps.reduce((acc, c) => acc + (parseFloat(c.price) || 0), 0);
                
                container.innerHTML = `
                    <div class="animate-fade-in">
                        <div class="relative h-48 w-full">
                            <img src="https://images.unsplash.com/photo-1562322140-8baeececf3df?w=800&q=80" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-pink-900/90 to-transparent flex flex-col justify-end p-6 text-white">
                                <h2 class="text-2xl font-bold font-serif">Panel de Control</h2>
                                <p class="text-xs opacity-70 italic">Sincronización Cloud Activa</p>
                            </div>
                        </div>
                        <div class="px-6 -mt-8 relative grid grid-cols-3 gap-3">
                            <div class="bg-white rounded-2xl p-4 shadow-lg text-center border border-pink-50">
                                <div class="text-2xl font-bold font-serif text-pink-600">${todayApps.length}</div>
                                <div class="text-[9px] uppercase font-bold text-gray-400">Hoy</div>
                            </div>
                            <div class="bg-white rounded-2xl p-4 shadow-lg text-center border border-pink-50">
                                <div class="text-2xl font-bold font-serif text-pink-600">${appointments.length}</div>
                                <div class="text-[9px] uppercase font-bold text-gray-400">Total</div>
                            </div>
                            <div class="bg-white rounded-2xl p-4 shadow-lg text-center border border-pink-50">
                                <div class="text-2xl font-bold font-serif text-pink-600">${clients.length}</div>
                                <div class="text-[9px] uppercase font-bold text-gray-400">Nube</div>
                            </div>
                        </div>
                        <div class="mx-6 mt-6 bg-pink-800 rounded-3xl p-6 text-white shadow-xl">
                            <div class="text-[10px] opacity-70 uppercase font-bold mb-1">Ingresos Hoy</div>
                            <div class="text-3xl font-bold font-serif">$${earnings}</div>
                        </div>
                        <div class="px-6 mt-8">
                            <h3 class="font-bold text-gray-800 mb-4">Citas de Hoy</h3>
                            <div class="space-y-3">
                                ${todayApps.length ? todayApps.map(renderCard).join('') : '<div class="text-center py-10 text-gray-400 text-sm border-2 border-dashed rounded-2xl">Sin citas hoy</div>'}
                            </div>
                        </div>
                    </div>
                `;
            } else if (router.current === 'new') {
                container.innerHTML = `
                    <div class="p-6 animate-fade-in">
                        <h2 class="text-xl font-bold font-serif text-gray-800 mb-6">Nueva Cita</h2>
                        <form onsubmit="addAppointment(event)" class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nombre Clienta</label>
                                <input name="clientName" required class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none focus:border-pink-500" placeholder="Ej: Maria Lopez">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Servicio</label>
                                    <select name="service" required class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none focus:border-pink-500 appearance-none">
                                        <option value="Alisado">Alisado Pro</option>
                                        <option value="Keratina">Keratina</option>
                                        <option value="Botox">Botox Capilar</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Precio ($)</label>
                                    <input name="price" type="number" required class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none focus:border-pink-500">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Fecha</label>
                                    <input name="date" type="date" value="${today}" required class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Hora</label>
                                    <input name="time" type="time" value="09:00" required class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 outline-none">
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-pink-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-pink-200 mt-4 active:scale-95 transition-transform">GUARDAR EN LA NUBE</button>
                        </form>
                    </div>
                `;
            } else if (router.current === 'calendar') {
                container.innerHTML = `
                    <div class="p-6 animate-fade-in">
                        <h2 class="text-xl font-bold font-serif text-gray-800 mb-6">Agenda Completa</h2>
                        <div class="space-y-3">
                            ${appointments.sort((a,b) => a.date.localeCompare(b.date)).map(renderCard).join('') || '<div class="text-center py-20 opacity-30">Nube vacía</div>'}
                        </div>
                    </div>
                `;
            } else if (router.current === 'clients') {
                container.innerHTML = `
                    <div class="p-6 animate-fade-in">
                        <h2 class="text-xl font-bold font-serif text-gray-800 mb-6">Directorio</h2>
                        <div class="space-y-3">
                            ${clients.map(c => `
                                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center gap-4">
                                    <div class="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center text-pink-600 font-bold">${c.name.charAt(0)}</div>
                                    <div class="flex-1">
                                        <div class="text-sm font-bold text-gray-800">${c.name}</div>
                                        <div class="text-[10px] text-gray-400 italic">Cliente Premium</div>
                                    </div>
                                    <button onclick="deleteCli('${c.id}')" class="p-2 text-gray-200 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            `).join('') || '<div class="text-center py-20 opacity-30">Sin clientes registrados</div>'}
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function renderCard(app) {
            return `
                <div class="bg-white border-l-4 border-pink-500 rounded-2xl p-4 shadow-sm flex items-center gap-4">
                    <div class="bg-pink-50 rounded-xl p-2 min-w-[50px] text-center">
                        <div class="text-pink-600 font-bold leading-none">${app.date.split('-')[2]}</div>
                        <div class="text-[8px] text-pink-300 font-bold uppercase">${new Date(app.date).toLocaleString('es', {month: 'short'})}</div>
                    </div>
                    <div class="flex-1">
                        <div class="text-sm font-bold text-gray-800">${app.clientName}</div>
                        <div class="text-[10px] text-gray-500">${app.service} • ${app.time}</div>
                        <div class="text-[10px] font-bold text-green-600 mt-1">$${app.price}</div>
                    </div>
                    <button onclick="deleteApp('${app.id}')" class="p-2 text-gray-200 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `;
        }

        // Inicializar App
        window.onload = () => {
            initApp();
            router.navigate('home');
        };
    </script>
</body>
</html>
