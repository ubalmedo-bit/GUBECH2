<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUBECH Agenda Pro - Finanzas y Reportes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f1f5f9; 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        ::-webkit-scrollbar { width: 0px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .nav-item.active { color: #db2777; }
        .glass-header {
            background: linear-gradient(135deg, #831843 0%, #be185d 50%, #db2777 100%);
        }
        .modal-overlay {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
        @media print {
            nav, header, #connection-status, .no-print { display: none !important; }
            body { background: white; }
            #app-container { max-width: 100%; box-shadow: none; }
            .print-only { display: block !important; }
            .print-card { border: 1px solid #eee; break-inside: avoid; margin-bottom: 10px; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>
    <div id="app-container" class="w-full max-w-[480px] bg-white min-h-screen shadow-2xl relative flex flex-col">
        
        <!-- Pantalla de Carga -->
        <div id="loading-screen" class="absolute inset-0 z-[100] bg-pink-50 flex flex-col items-center justify-center transition-opacity duration-500">
            <div class="animate-spin text-pink-600 mb-4">
                <i data-lucide="loader-2" class="w-12 h-12"></i>
            </div>
            <p class="text-pink-800 font-serif font-bold text-2xl tracking-tighter">GUBECH</p>
            <p class="text-pink-400 text-[10px] uppercase tracking-widest mt-2 font-bold tracking-[0.2em]">Cargando Finanzas...</p>
        </div>

        <!-- Cabecera -->
        <header class="sticky top-0 z-50 glass-header text-white px-6 py-4 flex justify-between items-center shadow-lg no-print">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center backdrop-blur-md border border-white/30">
                    <span class="text-xl font-bold font-serif italic">G</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight font-serif uppercase leading-none">GUBECH</h1>
                    <p class="text-[8px] opacity-70 font-bold uppercase tracking-widest mt-1">Sincronización Premium</p>
                </div>
            </div>
            <div id="connection-status" class="flex items-center gap-2 bg-black/10 px-3 py-1 rounded-full border border-white/10">
                <div class="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>
            </div>
        </header>

        <!-- Contenido Principal -->
        <main id="main-content" class="flex-1 pb-24 overflow-y-auto overflow-x-hidden bg-slate-50/50"></main>

        <!-- Notificaciones Toast -->
        <div id="toast" class="hidden fixed top-24 left-1/2 -translate-x-1/2 z-[110] px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 bg-slate-900 text-white text-sm font-medium animate-fade-in border border-white/10 no-print"></div>

        <!-- Modal de Confirmación -->
        <div id="confirm-modal" class="hidden fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-6 no-print">
            <div class="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl animate-fade-in border border-gray-100">
                <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center text-red-500 mb-4">
                    <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2">¿Eliminar registro?</h3>
                <p class="text-sm text-gray-500 mb-6 leading-relaxed">Esta acción borrará los datos permanentemente de la nube.</p>
                <div class="flex gap-3">
                    <button id="cancel-btn" class="flex-1 py-3 px-4 bg-gray-50 text-gray-600 font-bold rounded-2xl active:scale-95 transition-all text-sm">Cancelar</button>
                    <button id="confirm-btn" class="flex-1 py-3 px-4 bg-red-500 text-white font-bold rounded-2xl active:scale-95 transition-all shadow-lg shadow-red-100 text-sm">Eliminar</button>
                </div>
            </div>
        </div>

        <!-- Navegación Inferior -->
        <nav class="fixed bottom-0 w-full max-w-[480px] bg-white/80 backdrop-blur-xl border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50 no-print">
            <button onclick="router.navigate('home')" class="nav-item flex flex-col items-center gap-1 text-gray-400 transition-colors" id="nav-home">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Inicio</span>
            </button>
            <button onclick="router.navigate('calendar')" class="nav-item flex flex-col items-center gap-1 text-gray-400 transition-colors" id="nav-calendar">
                <i data-lucide="calendar" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Agenda</span>
            </button>
            <div class="relative -mt-10">
                <button onclick="router.navigate('new')" class="w-14 h-14 bg-pink-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-pink-200 active:scale-90 transition-all border-4 border-white">
                    <i data-lucide="plus" class="w-8 h-8"></i>
                </button>
            </div>
            <button onclick="router.navigate('stats')" class="nav-item flex flex-col items-center gap-1 text-gray-400 transition-colors" id="nav-stats">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Reportes</span>
            </button>
            <button onclick="router.navigate('clients')" class="nav-item flex flex-col items-center gap-1 text-gray-400 transition-colors" id="nav-clients">
                <i data-lucide="users" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold uppercase">Clientes</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0lLFHxRrEe27lMcn-3dcCYGFU7Cp4y0w",
            authDomain: "gubech2.firebaseapp.com",
            projectId: "gubech2",
            storageBucket: "gubech2.firebasestorage.app",
            messagingSenderId: "213017328047",
            appId: "1:213017328047:web:e665ddd73230afd79b575a",
            measurementId: "G-4DSZCFS9MF"
        };

        const appId = 'gub-agenda-pro-html';
        let db, auth, user;
        let appointments = [];
        let clients = [];
        let editingAppointmentId = null;

        window.router = {
            current: 'home',
            navigate: function(view, id = null) {
                this.current = view;
                editingAppointmentId = id;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'text-pink-600'));
                const activeNav = document.getElementById(`nav-${view}`);
                if(activeNav) activeNav.classList.add('active', 'text-pink-600');
                render();
                window.scrollTo(0,0);
            }
        };

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };

        const initApp = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (u) => {
                    if (u) {
                        user = u;
                        setupDataListeners();
                    }
                });
            } catch (error) {
                console.error("Error:", error);
            }
        };

        const setupDataListeners = () => {
            const appRef = collection(db, 'artifacts', appId, 'public', 'data', 'appointments');
            onSnapshot(appRef, (snap) => {
                appointments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
                document.getElementById('loading-screen').classList.add('opacity-0', 'pointer-events-none');
            });

            const cliRef = collection(db, 'artifacts', appId, 'public', 'data', 'clients');
            onSnapshot(cliRef, (snap) => {
                clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            });
        };

        window.handleAppointmentSubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.price = parseFloat(data.price) || 0;
            data.hasKit = e.target.hasKit.checked;
            data.kitPrice = data.hasKit ? (parseFloat(data.kitPrice) || 0) : 0;
            
            try {
                if (editingAppointmentId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'appointments', editingAppointmentId), {
                        ...data,
                        updatedAt: serverTimestamp()
                    });
                    showToast("✅ Actualizado");
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'appointments'), {
                        ...data,
                        createdAt: serverTimestamp()
                    });
                }
                router.navigate('home');
            } catch (err) {
                showToast("Error al guardar");
            }
        };

        window.toggleKitPrice = (checkbox) => {
            document.getElementById('kit-price-container').classList.toggle('hidden', !checkbox.checked);
        };

        window.printReport = () => {
            window.print();
        };

        let pendingDelete = null;
        window.deleteDocItem = (col, id, event) => {
            if(event) event.stopPropagation();
            pendingDelete = { col, id };
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        document.getElementById('cancel-btn').onclick = () => document.getElementById('confirm-modal').classList.add('hidden');
        document.getElementById('confirm-btn').onclick = async () => {
            const { col, id } = pendingDelete;
            document.getElementById('confirm-modal').classList.add('hidden');
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
            showToast("Registro eliminado");
        };

        const getDates = () => {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            
            // Inicio de semana (Lunes)
            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1);
            const weekStart = new Date(now.setDate(diff)).toISOString().split('T')[0];
            
            // Inicio de mes
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            
            return { todayStr, weekStart, monthStart };
        };

        function render() {
            const container = document.getElementById('main-content');
            const { todayStr, weekStart, monthStart } = getDates();

            if (router.current === 'home') {
                const todayApps = appointments.filter(a => a.date === todayStr);
                const revenue = todayApps.reduce((acc, c) => acc + (parseFloat(c.price) || 0) + (parseFloat(c.kitPrice) || 0), 0);

                container.innerHTML = `
                    <div class="animate-fade-in no-print">
                        <div class="relative h-48 w-full overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1562322140-8baeececf3df?w=800&q=80" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-pink-900/90 to-transparent flex flex-col justify-end p-6 text-white">
                                <h2 class="text-2xl font-bold font-serif">Panel Cloud</h2>
                                <p class="text-[10px] opacity-70 italic uppercase tracking-widest font-bold">Resumen Diario</p>
                            </div>
                        </div>
                        <div class="px-6 -mt-8 relative grid grid-cols-2 gap-4">
                            <div class="bg-white rounded-2xl p-4 shadow-lg border border-pink-50">
                                <div class="text-2xl font-bold font-serif text-pink-600">${todayApps.length}</div>
                                <div class="text-[9px] uppercase font-bold text-gray-400 tracking-tighter">Servicios Hoy</div>
                            </div>
                            <div class="bg-white rounded-2xl p-4 shadow-lg border border-pink-50">
                                <div class="text-2xl font-bold font-serif text-pink-600">$${revenue}</div>
                                <div class="text-[9px] uppercase font-bold text-gray-400 tracking-tighter">Total Hoy</div>
                            </div>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-bold text-gray-800 flex items-center gap-2">
                                    <i data-lucide="sun" class="w-4 h-4 text-pink-500"></i> Agenda de Hoy
                                </h3>
                                <span class="text-[10px] text-gray-400 font-bold">${todayStr}</span>
                            </div>
                            <div class="space-y-3">
                                ${todayApps.length ? todayApps.map(renderCard).join('') : '<div class="text-center py-12 text-gray-300 italic text-sm">No hay servicios hoy</div>'}
                            </div>
                        </div>
                    </div>
                `;
            } else if (router.current === 'stats') {
                const todayRev = appointments.filter(a => a.date === todayStr).reduce((acc, c) => acc + (parseFloat(c.price) || 0) + (parseFloat(c.kitPrice) || 0), 0);
                const weekRev = appointments.filter(a => a.date >= weekStart).reduce((acc, c) => acc + (parseFloat(c.price) || 0) + (parseFloat(c.kitPrice) || 0), 0);
                const monthRev = appointments.filter(a => a.date >= monthStart).reduce((acc, c) => acc + (parseFloat(c.price) || 0) + (parseFloat(c.kitPrice) || 0), 0);

                container.innerHTML = `
                    <div class="p-6 animate-fade-in no-print">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold font-serif text-gray-800">Finanzas</h2>
                            <button onclick="printReport()" class="flex items-center gap-2 bg-pink-100 text-pink-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-pink-200 transition-colors">
                                <i data-lucide="printer" class="w-4 h-4"></i> Reporte
                            </button>
                        </div>

                        <div class="space-y-4">
                            <!-- Tarjetas de Estadísticas -->
                            <div class="bg-gradient-to-br from-white to-pink-50 p-6 rounded-3xl border border-pink-100 shadow-sm">
                                <div class="text-[10px] font-bold text-gray-400 uppercase mb-1">Ganancias del Mes</div>
                                <div class="text-4xl font-bold font-serif text-pink-600">$${monthRev}</div>
                                <div class="mt-4 pt-4 border-t border-pink-100 grid grid-cols-2 gap-4">
                                    <div>
                                        <div class="text-[9px] font-bold text-gray-400 uppercase">Hoy</div>
                                        <div class="text-lg font-bold text-gray-700">$${todayRev}</div>
                                    </div>
                                    <div>
                                        <div class="text-[9px] font-bold text-gray-400 uppercase">Semana</div>
                                        <div class="text-lg font-bold text-gray-700">$${weekRev}</div>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                                <h4 class="text-xs font-bold text-gray-800 mb-4 uppercase tracking-widest">Resumen Mensual</h4>
                                <div class="space-y-4">
                                    <div class="flex justify-between items-end">
                                        <span class="text-xs text-gray-500">Total Servicios</span>
                                        <span class="text-sm font-bold">${appointments.filter(a => a.date >= monthStart).length}</span>
                                    </div>
                                    <div class="w-full bg-gray-50 h-2 rounded-full overflow-hidden">
                                        <div class="bg-pink-500 h-full w-[70%]"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mt-8">
                            <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                                <i data-lucide="history" class="w-4 h-4 text-pink-500"></i> Últimos Movimientos
                            </h3>
                            <div class="space-y-2">
                                ${appointments.slice(0, 5).sort((a,b) => b.date.localeCompare(a.date)).map(a => `
                                    <div class="flex items-center justify-between p-3 bg-white rounded-xl border border-gray-50">
                                        <div>
                                            <div class="text-xs font-bold">${a.clientName}</div>
                                            <div class="text-[9px] text-gray-400">${a.date}</div>
                                        </div>
                                        <div class="text-xs font-bold text-green-600">+$${(parseFloat(a.price) || 0) + (parseFloat(a.kitPrice) || 0)}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- REPORTE PARA IMPRESIÓN -->
                    <div class="print-only p-8">
                        <div class="text-center mb-10">
                            <h1 class="text-3xl font-bold font-serif">GUBECH AGENDA PRO</h1>
                            <p class="text-xs uppercase tracking-widest mt-2">Reporte de Servicios y Finanzas</p>
                            <div class="mt-4 text-sm font-bold border-b border-gray-200 pb-4">
                                Fecha de emisión: ${new Date().toLocaleDateString()}
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-6 mb-10">
                            <div class="border p-4 rounded-xl">
                                <div class="text-[10px] uppercase font-bold text-gray-400">Hoy</div>
                                <div class="text-xl font-bold">$${todayRev}</div>
                            </div>
                            <div class="border p-4 rounded-xl">
                                <div class="text-[10px] uppercase font-bold text-gray-400">Esta Semana</div>
                                <div class="text-xl font-bold">$${weekRev}</div>
                            </div>
                            <div class="border p-4 rounded-xl">
                                <div class="text-[10px] uppercase font-bold text-gray-400">Este Mes</div>
                                <div class="text-xl font-bold">$${monthRev}</div>
                            </div>
                        </div>

                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="bg-gray-50">
                                    <th class="p-3 border">Fecha</th>
                                    <th class="p-3 border">Cliente</th>
                                    <th class="p-3 border">Servicio</th>
                                    <th class="p-3 border text-right">Monto</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${appointments.sort((a,b) => b.date.localeCompare(a.date)).map(a => `
                                    <tr>
                                        <td class="p-3 border">${a.date}</td>
                                        <td class="p-3 border font-bold">${a.clientName}</td>
                                        <td class="p-3 border">${a.service} ${a.hasKit ? '(+Kit)' : ''}</td>
                                        <td class="p-3 border text-right font-bold">$${(parseFloat(a.price) || 0) + (parseFloat(a.kitPrice) || 0)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                            <tfoot>
                                <tr class="bg-gray-100 font-bold">
                                    <td colspan="3" class="p-3 border text-right">TOTAL GENERAL</td>
                                    <td class="p-3 border text-right">$${appointments.reduce((acc, c) => acc + (parseFloat(c.price) || 0) + (parseFloat(c.kitPrice) || 0), 0)}</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                `;
            } else if (router.current === 'new') {
                const app = editingAppointmentId ? appointments.find(a => a.id === editingAppointmentId) : null;
                const title = app ? "Editar Cita" : "Agendar Servicio";
                
                container.innerHTML = `
                    <div class="p-6 animate-fade-in no-print">
                        <div class="flex items-center gap-3 mb-6">
                             ${app ? `<button onclick="router.navigate('calendar')" class="text-gray-400"><i data-lucide="chevron-left"></i></button>` : ''}
                             <h2 class="text-xl font-bold font-serif text-gray-800">${title}</h2>
                        </div>
                        <form onsubmit="handleAppointmentSubmit(event)" class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Nombre Clienta</label>
                                <input name="clientName" value="${app?.clientName || ''}" required class="w-full bg-white border border-gray-100 rounded-2xl p-4 outline-none focus:border-pink-500 shadow-sm" placeholder="Ej: Marcela Pérez">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Servicio</label>
                                    <select name="service" class="w-full bg-white border border-gray-100 rounded-2xl p-4 outline-none shadow-sm appearance-none">
                                        <option value="Alisado" ${app?.service === 'Alisado' ? 'selected' : ''}>Alisado Pro</option>
                                        <option value="Keratina" ${app?.service === 'Keratina' ? 'selected' : ''}>Keratina</option>
                                        <option value="Botox" ${app?.service === 'Botox' ? 'selected' : ''}>Botox Capilar</option>
                                        <option value="Corte" ${app?.service === 'Corte' ? 'selected' : ''}>Corte + Secado</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Precio ($)</label>
                                    <input name="price" type="number" value="${app?.price || ''}" required class="w-full bg-white border border-gray-100 rounded-2xl p-4 outline-none shadow-sm">
                                </div>
                            </div>

                            <div class="bg-pink-50/50 p-4 rounded-2xl border border-pink-100">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center gap-2">
                                        <i data-lucide="package" class="w-4 h-4 text-pink-500"></i>
                                        <span class="text-xs font-bold text-gray-700">Incluye Kit de Mantenimiento</span>
                                    </div>
                                    <input type="checkbox" name="hasKit" onchange="toggleKitPrice(this)" ${app?.hasKit ? 'checked' : ''} class="w-5 h-5 accent-pink-600">
                                </div>
                                <div id="kit-price-container" class="${app?.hasKit ? '' : 'hidden'} mt-3 pt-3 border-t border-pink-100">
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Costo del Kit ($)</label>
                                    <input name="kitPrice" type="number" value="${app?.kitPrice || ''}" class="w-full bg-white border border-gray-100 rounded-2xl p-4 outline-none shadow-sm" placeholder="0">
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Fecha</label>
                                    <input name="date" type="date" value="${app?.date || todayStr}" required class="w-full bg-white border border-gray-100 rounded-2xl p-4 outline-none shadow-sm">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Hora</label>
                                    <input name="time" type="time" value="${app?.time || '09:00'}" required class="w-full bg-white border border-gray-100 rounded-2xl p-4 outline-none shadow-sm">
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-pink-600 text-white py-4 rounded-3xl font-bold shadow-lg shadow-pink-100 mt-4 active:scale-95 transition-all uppercase tracking-wide">
                                ${app ? 'Guardar Cambios' : 'Agendar en Cloud'}
                            </button>
                        </form>
                    </div>
                `;
            } else if (router.current === 'calendar') {
                container.innerHTML = `
                    <div class="p-6 animate-fade-in no-print">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold font-serif text-gray-800">Agenda</h2>
                            <span class="text-[10px] font-bold text-pink-600 bg-pink-50 px-3 py-1 rounded-full">${appointments.length} Citas</span>
                        </div>
                        <div class="space-y-3">
                            ${appointments.sort((a,b) => b.date.localeCompare(a.date)).map(renderCard).join('') || '<p class="text-center py-20 text-gray-300">Vacío</p>'}
                        </div>
                    </div>
                `;
            } else if (router.current === 'clients') {
                container.innerHTML = `
                    <div class="p-6 animate-fade-in no-print">
                        <h2 class="text-xl font-bold font-serif text-gray-800 mb-6">Clientes</h2>
                        <div class="space-y-3">
                            ${clients.map(c => `
                                <div class="bg-white p-4 rounded-2xl border border-gray-50 flex items-center gap-4 shadow-sm">
                                    <div class="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center text-pink-600 font-bold uppercase">${c.name.charAt(0)}</div>
                                    <div class="flex-1">
                                        <div class="text-sm font-bold text-gray-800">${c.name}</div>
                                        <div class="text-[9px] text-gray-400">Cliente Cloud Sincronizado</div>
                                    </div>
                                    <button onclick="deleteDocItem('clients', '${c.id}', event)" class="p-2 text-gray-200 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            `).join('') || '<p class="text-center py-20 text-gray-300">Sin clientes registrados</p>'}
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function renderCard(app) {
            const total = (parseFloat(app.price) || 0) + (parseFloat(app.kitPrice) || 0);
            return `
                <div onclick="router.navigate('new', '${app.id}')" class="bg-white border-l-4 border-pink-500 rounded-2xl p-4 shadow-sm flex items-center gap-4 hover:shadow-md transition-all cursor-pointer active:scale-[0.98] no-print">
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="text-sm font-bold text-gray-800">${app.clientName}</div>
                                <div class="text-[10px] text-gray-400 font-bold">${app.service} • ${app.time} HS</div>
                            </div>
                            <div class="text-[12px] font-bold text-pink-600 bg-pink-50 px-2 py-1 rounded-lg">
                                $${total}
                            </div>
                        </div>
                        <div class="mt-2 flex items-center gap-2">
                            <span class="text-[9px] font-bold text-gray-400 uppercase">${app.date}</span>
                            ${app.hasKit ? `
                                <span class="flex items-center gap-1 bg-green-50 text-green-600 text-[8px] px-2 py-0.5 rounded-full font-bold uppercase tracking-tighter">
                                    <i data-lucide="package" class="w-2.5 h-2.5"></i> Kit Inlcluído (+$${app.kitPrice})
                                </span>
                            ` : ''}
                        </div>
                    </div>
                    <button onclick="deleteDocItem('appointments', '${app.id}', event)" class="p-2 text-gray-200 hover:text-red-500 transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `;
        }

        window.onload = initApp;
    </script>
</body>
</html>
